services:
  - type: web
    name: danya-tattoo-voronezh
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: app-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PERSISTENT_ROOT
        value: /opt/render/project/src/storage
